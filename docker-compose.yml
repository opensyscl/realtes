name: realstate-valencia

services:
  # ------------- Backend Laravel -------------
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: rsv-php
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    environment:
      PHP_IDE_CONFIG: serverName=rsv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks: [rsv]

  nginx:
    image: nginx:1.27-alpine
    container_name: rsv-nginx
    ports:
      - "58000:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks: [rsv]

  # ------------- Frontend Next.js -------------
  frontend:
    image: node:20-alpine
    container_name: rsv-frontend
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm dev"
    ports:
      - "3001:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:58000
      BACKEND_INTERNAL_URL: http://nginx:80
      WATCHPACK_POLLING: "true"
    networks: [rsv]

  # ------------- Database -------------
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: rsv-postgres
    ports:
      - "55432:5432"
    environment:
      POSTGRES_DB: realstate
      POSTGRES_USER: realstate
      POSTGRES_PASSWORD: realstate
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U realstate -d realstate"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [rsv]

  # ------------- Redis -------------
  redis:
    image: redis:7-alpine
    container_name: rsv-redis
    ports:
      - "56379:6379"
    volumes:
      - redis_data:/data
    networks: [rsv]

  # ------------- Meilisearch -------------
  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: rsv-meilisearch
    ports:
      - "57700:7700"
    environment:
      MEILI_MASTER_KEY: masterKeyLocalDev
      MEILI_ENV: development
    volumes:
      - meilisearch_data:/meili_data
    networks: [rsv]

  # ------------- Mailpit -------------
  mailpit:
    image: axllent/mailpit:latest
    container_name: rsv-mailpit
    ports:
      - "58025:8025"  # UI
      - "51025:1025"  # SMTP
    networks: [rsv]

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  frontend_node_modules:

networks:
  rsv:
    driver: bridge
